<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WR Voice Setup</title>
<style>
:root {
    --bg: rgba(10,10,10,0.85);
    --bg-glass: rgba(255,255,255,0.04);
    --border-glass: rgba(255,255,255,0.10);
    --green: #00ff88;
    --green-dim: rgba(0,255,136,0.15);
    --green-glow: 0 0 20px rgba(0,255,136,0.3);
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.5);
    --font: 'Consolas', monospace;
    --warn: #ffcc00;
    --error: #ff4466;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: var(--font);
    background: var(--bg);
    backdrop-filter: blur(30px);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    user-select: none;
    animation: body-fade 0.6s ease;
}
@keyframes body-fade {
    from { opacity: 0; } to { opacity: 1; }
}

/* ── Content area ─────────────────────────── */
#content {
    height: 100vh;
    overflow: hidden;
    position: relative;
}

/* ── Screens ──────────────────────────────── */
.screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: translateX(30px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    pointer-events: none;
}
.screen.active {
    opacity: 1;
    transform: translateX(0);
    pointer-events: all;
}

/* ── Buttons ──────────────────────────────── */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
}
.btn-primary {
    background: var(--green);
    color: #000;
    box-shadow: var(--green-glow);
}
.btn-primary:hover:not(:disabled) {
    filter: brightness(1.1);
    transform: scale(1.02);
    box-shadow: 0 0 30px rgba(0,255,136,0.4);
}
.btn-primary:active:not(:disabled) {
    transform: scale(0.98);
}
.btn-primary:disabled {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.3);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
}
.btn-secondary {
    background: rgba(255,255,255,0.05);
    color: var(--text-dim);
    border: 1px solid var(--border-glass);
}
.btn-secondary:hover {
    background: rgba(255,255,255,0.1);
    color: var(--text);
}
.btn-cancel {
    background: rgba(255,68,102,0.1);
    color: var(--error);
    border: 1px solid rgba(255,68,102,0.2);
}
.btn-cancel:hover {
    background: rgba(255,68,102,0.2);
}

/* ── Footer ───────────────────────────────── */
.screen-footer {
    margin-top: auto;
    display: flex;
    gap: 12px;
    padding-top: 16px;
}
.screen-footer .btn { flex: 1; }

/* ── Divider ──────────────────────────────── */
.divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    margin: 10px auto;
}

/* ── Glass card ───────────────────────────── */
.glass {
    background: var(--bg-glass);
    border: 1px solid var(--border-glass);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    padding: 20px;
}

/* ════════════════════════════════════════════
   SCREEN 1: Welcome
   ════════════════════════════════════════════ */
#screen-welcome {
    align-items: center;
    text-align: center;
    position: relative;
}
#screen-welcome::before {
    content: '';
    position: absolute;
    top: -80px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(0,255,136,0.06) 0%, transparent 70%);
    pointer-events: none;
}
#screen-welcome .logo {
    max-width: 200px;
    max-height: 60px;
    margin-bottom: 12px;
    opacity: 0.9;
}
#screen-welcome h1 {
    font-size: 24px;
    color: var(--green);
    margin-bottom: 2px;
}
.version {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
}
.subtitle {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 16px;
}

/* Language switcher */
.lang-switcher {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
}
.lang-btn {
    padding: 8px 24px;
    border: 1px solid var(--border-glass);
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
}
.lang-btn.active {
    background: var(--green-dim);
    border-color: var(--green);
    color: var(--green);
}
.lang-btn:hover:not(.active) {
    background: rgba(255,255,255,0.06);
    color: var(--text);
}

/* Install path */
.path-group {
    width: 100%;
    margin-bottom: 16px;
}
.path-group label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
    text-align: left;
}
.path-row {
    display: flex;
    gap: 8px;
}
.path-input {
    flex: 1;
    padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border-glass);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
}
.path-input:focus {
    border-color: rgba(0,255,136,0.3);
}
.path-browse {
    padding: 10px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border-glass);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
}
.path-browse:hover {
    background: rgba(255,255,255,0.08);
    color: var(--text);
}

/* ════════════════════════════════════════════
   SCREEN 2: System Check
   ════════════════════════════════════════════ */
.check-title {
    font-size: 18px;
    color: var(--green);
    margin-bottom: 20px;
}
.check-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
    overflow-y: auto;
}
.check-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--bg-glass);
    border: 1px solid var(--border-glass);
    border-radius: 12px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s ease;
}
.check-item.visible {
    opacity: 1;
    transform: translateY(0);
}
.check-icon {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-size: 14px;
    flex-shrink: 0;
}
.check-icon.ok {
    background: var(--green-dim);
    color: var(--green);
}
.check-icon.warn {
    background: rgba(255,204,0,0.15);
    color: var(--warn);
}
.check-icon.fail {
    background: rgba(255,68,102,0.15);
    color: var(--error);
}
.check-text {
    font-size: 13px;
    color: var(--text);
    flex: 1;
}
.check-detail {
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
    flex-shrink: 0;
}

/* ════════════════════════════════════════════
   SCREEN 3: Installing
   ════════════════════════════════════════════ */
.install-title {
    font-size: 18px;
    color: var(--green);
    margin-bottom: 12px;
}
.terminal {
    flex: 1;
    background: rgba(8,8,12,0.9);
    border: 1px solid var(--border-glass);
    border-radius: 12px;
    padding: 16px;
    overflow-y: auto;
    min-height: 0;
    margin-bottom: 12px;
}
.terminal-line {
    font-size: 12px;
    line-height: 1.8;
    color: var(--green);
    opacity: 0;
    animation: line-in 0.3s ease forwards;
    white-space: pre-wrap;
    word-break: break-all;
}
.terminal-line.error { color: var(--error); }
.terminal-line.warn { color: var(--warn); }
.terminal-line.dim { color: var(--text-dim); }

@keyframes line-in {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
}

.cursor-blink::after {
    content: '\2588';
    color: var(--green);
    animation: blink 1s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

.progress-text {
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
}
.progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 12px;
}
.progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease;
    box-shadow: var(--green-glow);
}

/* ════════════════════════════════════════════
   SCREEN 4: Done
   ════════════════════════════════════════════ */
#screen-done {
    align-items: center;
    text-align: center;
}
.checkmark-circle {
    margin-bottom: 16px;
    filter: drop-shadow(0 0 20px rgba(0,255,136,0.3));
    animation: pulse-glow 2s ease-in-out infinite;
}
@keyframes pulse-glow {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(0,255,136,0.3)); }
    50%      { filter: drop-shadow(0 0 35px rgba(0,255,136,0.5)); }
}
.checkmark-svg { width: 80px; height: 80px; }
.checkmark-svg circle {
    fill: none;
    stroke: var(--green);
    stroke-width: 2;
    stroke-dasharray: 226;
    stroke-dashoffset: 226;
    animation: circle-draw 0.6s ease forwards;
}
.checkmark-svg polyline {
    fill: none;
    stroke: var(--green);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 50;
    stroke-dashoffset: 50;
    animation: check-draw 0.4s ease forwards 0.5s;
}
@keyframes circle-draw { to { stroke-dashoffset: 0; } }
@keyframes check-draw  { to { stroke-dashoffset: 0; } }

.done-title {
    font-size: 22px;
    color: var(--green);
    margin-bottom: 20px;
}
.tutorial {
    width: 100%;
    text-align: left;
    padding: 16px 20px;
    background: var(--bg-glass);
    border: 1px solid var(--border-glass);
    border-radius: 12px;
    margin-bottom: 16px;
}
.tutorial h3 {
    font-size: 13px;
    color: var(--warn);
    margin-bottom: 8px;
}
.tutorial p {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.7;
}
.tutorial .models-note {
    color: rgba(255,255,255,0.35);
    margin-top: 10px;
}

/* ── Scrollbar ────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,0.2);
}
</style>
</head>
<body>

<div id="content">

    <!-- ════ SCREEN 1: Welcome ════ -->
    <div id="screen-welcome" class="screen active">
        <img id="logo" class="logo" src="" alt=""
             style="display:none">
        <div class="divider"></div>
        <h1>WR Voice</h1>
        <span class="version">v1.0 BETA</span>
        <p class="subtitle" data-i18n="welcome_sub"></p>
        <div class="divider"></div>

        <div class="lang-switcher">
            <button class="lang-btn active" data-lang="ro"
                    onclick="setLang('ro')">RO</button>
            <button class="lang-btn" data-lang="en"
                    onclick="setLang('en')">EN</button>
        </div>

        <div class="path-group">
            <label data-i18n="path_label"></label>
            <div class="path-row">
                <input id="install-path" class="path-input"
                       type="text" spellcheck="false">
                <button class="path-browse" onclick="browseFolder()"
                        data-i18n="browse"></button>
            </div>
        </div>

        <div class="screen-footer">
            <button class="btn btn-primary"
                    onclick="showScreen('check')"
                    data-i18n="continue"></button>
        </div>
    </div>

    <!-- ════ SCREEN 2: System Check ════ -->
    <div id="screen-check" class="screen">
        <h2 class="check-title" data-i18n="checking"></h2>
        <div class="check-list" id="check-list"></div>
        <div class="screen-footer">
            <button class="btn btn-primary" id="install-btn"
                    disabled onclick="showScreen('install')"
                    data-i18n="install"></button>
        </div>
    </div>

    <!-- ════ SCREEN 3: Installing ════ -->
    <div id="screen-install" class="screen">
        <h2 class="install-title" data-i18n="installing"></h2>
        <div class="terminal" id="terminal">
            <div class="cursor-blink" id="terminal-cursor"></div>
        </div>
        <div class="progress-text" id="progress-text">...</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="screen-footer" id="install-footer">
            <button class="btn btn-cancel" id="cancel-btn"
                    onclick="cancelInstall()"
                    style="display:none"
                    data-i18n="cancel_download"></button>
        </div>
    </div>

    <!-- ════ SCREEN 4: Done ════ -->
    <div id="screen-done" class="screen">
        <div class="checkmark-circle">
            <svg class="checkmark-svg" viewBox="0 0 80 80">
                <circle cx="40" cy="40" r="36"/>
                <polyline points="25,42 35,52 55,30"/>
            </svg>
        </div>
        <h2 class="done-title" data-i18n="done_title"></h2>
        <div class="tutorial" id="tutorial-section"></div>
        <div class="screen-footer">
            <button class="btn btn-secondary"
                    onclick="closeWindow()"
                    data-i18n="close"></button>
            <button class="btn btn-primary"
                    onclick="launchApp()"
                    data-i18n="launch"></button>
        </div>
    </div>

</div>

<script>
/* ══════════════════════════════════════════════
   STRINGS — RO / EN
   ══════════════════════════════════════════════ */
const STRINGS = {
    ro: {
        welcome_title: "Bun venit la WR Voice",
        welcome_sub:   "Dictare vocala cu AI \u2014 gratuit, local, fara cloud",
        path_label:    "Unde vrei sa instalezi aplicatia?",
        browse:        "Alege folder",
        continue:      "Continua \u2192",
        checking:      "Se verifica sistemul...",
        install:       "Instaleaza \u2192",
        installing:    "Se instaleaza...",
        done_title:    "WR Voice a fost instalat!",
        launch:        "Lanseaza WR Voice",
        close:         "Inchide",
        cancel_download: "Anuleaza",
        os_ok:    "Windows {version} detectat",
        os_fail:  "Windows incompatibil",
        ram_ok:   "Memorie sistem: {gb} GB",
        gpu_ok:   "Placa ta video e compatibila",
        gpu_fail: "GPU NVIDIA nedetectat \u2014 va rula pe CPU",
        cuda_ok:   "Accelerare AI disponibila",
        cuda_fail: "CUDA negasit \u2014 se va descarca automat (~414 MB, o singura data)",
        disk_ok:   "{gb} GB spatiu liber pe disc",
        disk_fail: "Spatiu insuficient pe disc",
        model_ok:   "Model AI gasit \u2014 nu e nevoie de download suplimentar",
        model_warn: "Model AI va fi descarcat la prima pornire (~1.5 GB)",
        uninstall_title: "CUM SE DEZINSTALEAZA",
        uninstall_text:  "Deschide folderul de instalare \u2192 ruleaza Uninstall.exe\nSau: Start Menu \u2192 cauta WR Voice \u2192 Uninstall",
        models_text:     "Modelele AI descarcate se sterg separat din:\n%LOCALAPPDATA%\\WRVoice\\"
    },
    en: {
        welcome_title: "Welcome to WR Voice",
        welcome_sub:   "AI voice dictation \u2014 free, local, no cloud",
        path_label:    "Where do you want to install?",
        browse:        "Browse",
        continue:      "Continue \u2192",
        checking:      "Checking your system...",
        install:       "Install \u2192",
        installing:    "Installing...",
        done_title:    "WR Voice has been installed!",
        launch:        "Launch WR Voice",
        close:         "Close",
        cancel_download: "Cancel",
        os_ok:    "Windows {version} detected",
        os_fail:  "Windows incompatible",
        ram_ok:   "System memory: {gb} GB",
        gpu_ok:   "Graphics card compatible",
        gpu_fail: "NVIDIA GPU not detected \u2014 will run on CPU",
        cuda_ok:   "AI acceleration available",
        cuda_fail: "CUDA not found \u2014 will download automatically (~414 MB, one time)",
        disk_ok:   "{gb} GB free disk space",
        disk_fail: "Not enough disk space",
        model_ok:   "AI model found \u2014 no additional download needed",
        model_warn: "AI model will be downloaded on first launch (~1.5 GB)",
        uninstall_title: "HOW TO UNINSTALL",
        uninstall_text:  "Open the install folder \u2192 run Uninstall.exe\nOr: Start Menu \u2192 search WR Voice \u2192 Uninstall",
        models_text:     "Downloaded AI models are stored separately in:\n%LOCALAPPDATA%\\WRVoice\\"
    }
};

let currentLang = 'ro';
let installPath = '';

/* ══════════════════════════════════════════════
   i18n helpers
   ══════════════════════════════════════════════ */
function t(key, replacements) {
    let str = STRINGS[currentLang][key] || key;
    if (replacements) {
        for (const [k, v] of Object.entries(replacements)) {
            str = str.replace('{' + k + '}', v);
        }
    }
    return str;
}

function updateTexts() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (STRINGS[currentLang][key]) {
            el.textContent = STRINGS[currentLang][key];
        }
    });
}

function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
    });
    updateTexts();
}

/* ══════════════════════════════════════════════
   Navigation
   ══════════════════════════════════════════════ */
function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s =>
        s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');

    if (name === 'check')   runChecks();
    if (name === 'install') startInstall();
    if (name === 'done')    buildTutorial();
}

/* ══════════════════════════════════════════════
   Browse folder
   ══════════════════════════════════════════════ */
async function browseFolder() {
    const path = await window.pywebview.api.browse_folder();
    if (path) {
        document.getElementById('install-path').value = path;
        installPath = path;
    }
}

/* ══════════════════════════════════════════════
   System checks (animated, one by one)
   ══════════════════════════════════════════════ */
async function runChecks() {
    const list = document.getElementById('check-list');
    list.innerHTML = '';
    const installBtn = document.getElementById('install-btn');
    installBtn.disabled = true;

    // 1. OS
    const os = await window.pywebview.api.check_os();
    addCheckItem(list, os.ok ? 'ok' : 'fail',
        os.ok ? t('os_ok', {version: os.version}) : t('os_fail'),
        os.detail);
    await delay(350);

    // 2. RAM
    const ram = await window.pywebview.api.check_ram();
    addCheckItem(list, ram.ok ? 'ok' : 'warn',
        t('ram_ok', {gb: ram.gb}), '');
    await delay(350);

    // 3. GPU
    const gpu = await window.pywebview.api.check_gpu();
    addCheckItem(list, gpu.ok ? 'ok' : 'warn',
        gpu.ok ? t('gpu_ok') : t('gpu_fail'),
        gpu.name || '');
    await delay(350);

    // 4. CUDA (only show if NVIDIA GPU detected)
    if (gpu.ok) {
        const cuda = await window.pywebview.api.check_cuda();
        addCheckItem(list, cuda.ok ? 'ok' : 'warn',
            cuda.ok ? t('cuda_ok') : t('cuda_fail'), '');
        await delay(350);
    }

    // 5. Disk space
    const path = document.getElementById('install-path').value || null;
    const disk = await window.pywebview.api.check_disk(path);
    addCheckItem(list, disk.ok ? 'ok' : 'fail',
        disk.ok ? t('disk_ok', {gb: disk.free_gb}) : t('disk_fail'),
        '');
    await delay(350);

    // 6. AI model
    const model = await window.pywebview.api.check_model();
    addCheckItem(list, model.found ? 'ok' : 'warn',
        model.found ? t('model_ok') : t('model_warn'),
        model.found ? model.name : '');

    // Enable install button
    await delay(300);
    installBtn.disabled = false;
}

function addCheckItem(list, iconClass, text, detail) {
    const icon = iconClass === 'ok'   ? '\u2713'
               : iconClass === 'warn' ? '\u26a0'
               :                        '\u2717';
    const item = document.createElement('div');
    item.className = 'check-item';
    item.innerHTML =
        '<div class="check-icon ' + iconClass + '">' + icon + '</div>' +
        '<span class="check-text">' + escHtml(text) + '</span>' +
        (detail ? '<span class="check-detail">' + escHtml(detail) + '</span>' : '');
    list.appendChild(item);
    // Trigger animation in next frame
    requestAnimationFrame(() => {
        requestAnimationFrame(() => item.classList.add('visible'));
    });
}

function delay(ms) {
    return new Promise(r => setTimeout(r, ms));
}

function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

/* ══════════════════════════════════════════════
   Install
   ══════════════════════════════════════════════ */
async function startInstall() {
    const terminal = document.getElementById('terminal');
    const cursor   = document.getElementById('terminal-cursor');
    terminal.innerHTML = '';
    terminal.appendChild(cursor);

    updateProgress(0, '...');

    const path = document.getElementById('install-path').value
                 || installPath;
    await window.pywebview.api.start_install(path, currentLang);
}

function addTerminalLine(msg, cls) {
    const terminal = document.getElementById('terminal');
    const cursor   = document.getElementById('terminal-cursor');
    const line = document.createElement('div');
    line.className = 'terminal-line' + (cls ? ' ' + cls : '');
    line.textContent = '> ' + msg;
    terminal.insertBefore(line, cursor);
    terminal.scrollTop = terminal.scrollHeight;
}

function updateProgress(percent, text) {
    document.getElementById('progress-fill').style.width =
        Math.max(0, percent) + '%';
    document.getElementById('progress-text').textContent = text;
}

// Listen for progress events from Python
window.addEventListener('install-progress', function(e) {
    const d = e.detail;
    const cls = d.phase === 'error' ? 'error'
              : d.phase === 'done'  ? ''
              :                       '';
    addTerminalLine(d.message, cls);
    updateProgress(d.percent, d.message);

    // Show cancel button during download phase
    document.getElementById('cancel-btn').style.display =
        d.phase === 'download' ? 'block' : 'none';

    // Auto-advance to done
    if (d.phase === 'done') {
        setTimeout(function() { showScreen('done'); }, 1200);
    }
});

async function cancelInstall() {
    await window.pywebview.api.cancel();
}

/* ══════════════════════════════════════════════
   Done screen
   ══════════════════════════════════════════════ */
function buildTutorial() {
    const s = document.getElementById('tutorial-section');
    s.innerHTML =
        '<h3>' + escHtml(t('uninstall_title')) + '</h3>' +
        '<p>' + escHtml(t('uninstall_text')).replace(/\n/g, '<br>') + '</p>' +
        '<p class="models-note">' +
            escHtml(t('models_text')).replace(/\n/g, '<br>') +
        '</p>';
}

async function launchApp() {
    await window.pywebview.api.launch_app();
}

async function closeWindow() {
    await window.pywebview.api.close_window();
}

/* ══════════════════════════════════════════════
   Init — runs when pywebview bridge is ready
   ══════════════════════════════════════════════ */
async function init() {
    // Load logo
    try {
        const b64 = await window.pywebview.api.get_logo_base64();
        if (b64) {
            const img = document.getElementById('logo');
            img.src = 'data:image/png;base64,' + b64;
            img.style.display = 'block';
        }
    } catch (_) {}

    // Default install path
    try {
        const dp = await window.pywebview.api.get_default_path();
        document.getElementById('install-path').value = dp;
        installPath = dp;
    } catch (_) {}

    updateTexts();
}

window.addEventListener('pywebviewready', init);
</script>
